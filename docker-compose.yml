services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cantabile
      POSTGRES_PASSWORD: cantabile
      POSTGRES_DB: cantabile
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # drizzle pg migrations run alphabetically on first boot to create the schema.
      - ../drizzle/pg:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cantabile -d cantabile"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgres://cantabile:cantabile@postgres:5432/cantabile?sslmode=disable
      PORT: "8080"
      # Bypass the WeChat gateway auth so /me/* is reachable in local dev.
      WECHAT_DEV_OPENID: dev-openid
      GIN_MODE: release
      # UpYun S3-compatible avatar uploads. Bucket is the UpYun space name.
      S3_ENDPOINT: https://s3.api.upyun.com
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_DOMAIN: imgfore.10d.xin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
